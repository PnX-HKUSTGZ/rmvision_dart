camera: hik

enable_recorder: false

odom2camera:
  # 这样写就够了，YAML 会把它当成字符串 "0.12 0.06 0.04"
  xyz: "0.12 0.06 0.04"
  rpy: "0.0 -0.0 0.0"

detector_log_level: INFO
tracker_log_level: INFO
serial_log_level: INFO

# 镜头档位配置：切换镜头时只修改 active_lens_profile，并重启整套系统
active_lens_profile: 35mm
lens_profiles:
  50mm:
    camera_name: hik_50mm
    camera_info_url: package://rm_vision_bringup/config/camera_info_50mm.yaml
    camera_to_livox:
      xyz: "-0.09187607 -0.37 -0.175"
      rpy: "0.0 0.0 0.0"
  35mm:
    camera_name: hik_35mm
    camera_info_url: package://rm_vision_bringup/config/camera_info_35mm.yaml
    camera_to_livox:
      # TODO: 35mm 的 camera_to_livox 真实外参补齐后替换这里。
      xyz: "-0.09187607 -0.62 0.14"
      rpy: "0.0 0.0 0.0"

# 公共坐标系/外参配置
camera_frame: camera_link
camera_optical_frame: camera_optical_frame
livox_frame: livox_frame
accum_target_frame: odom

# Livox 驱动启动参数（与 livox_ros2_driver 的 launch 对齐）
livox:
  config: livox_lidar_config.json
  rviz: livox_lidar.rviz
  frame_id: livox_frame
  xfer_format: 0
  multi_topic: 0
  data_src: 0
  publish_freq: 10.0
  output_data_type: 0
  cmdline_input_bd_code: "livox0000000001"
  lvx_file_path: /home/livox/livox_test.lvx
