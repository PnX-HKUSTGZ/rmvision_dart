/camera_node:
  ros__parameters:
    # 双相机启动时，camera_name / camera_info_url / camera_serial_number / frame_id
    # 会由 launch_params.yaml 的 cameras.base / cameras.outpost 覆盖。
    # 这里保留的是默认兜底值；改双相机标定和序列号请去 launch_params.yaml。
    camera_name: hik_35mm
    camera_info_url: package://rm_vision_bringup/config/camera_info_35mm.yaml
    exposure_time: 2500  # 曝光时间（单位取决于相机驱动）
    gain: 5.0  # 增益

/serial_driver:
  ros__parameters:
    timestamp_offset: -0.0025  # 串口时间戳补偿（秒）
    device_name: /dev/ttyACM0  # 串口设备
    baud_rate: 115200  # 波特率
    flow_control: none  # 流控
    parity: none  # 校验位
    stop_bits: "1"  # 停止位

/barcode_scanner:
  ros__parameters:
    device_name: /dev/ttyUSB0
    baud_rate: 115200
    flow_control: none
    parity: none
    stop_bits: "1"
    profile_topic: barcode/scan_profile
    slot_count: 4
    dart_id_min: 1
    dart_id_max: 16
    offset_min_deg: -10.0
    offset_max_deg: 10.0
    barcode_regex: "^D([0-9]+),O([+-]?[0-9]*\\.?[0-9]+)$"

/light_detector:
  ros__parameters:
    debug: false  # 比赛时关闭调试图发布，避免影响瞄准延迟
    binary_threshold: 100  # 二值化阈值
    # 以下 topic/frame 参数在双相机启动时会被 launch 覆盖成 base/outpost 命名空间下的值。
    # 如果要改双相机接线关系或输出 topic，优先改 launch_params.yaml 和 launch 文件。
    camera_optical_frame: camera_optical_frame  # 双相机时由 cameras.<role>.frame_id 覆盖
    cloud_topic: /livox/accum_points  # 双相机时 launch 覆盖为全局 /livox/accum_points
    fused_send_topic: send_fused  # 双相机时 launch 覆盖为 Send_fused
    image_topic: /image_raw  # 双相机时 launch 覆盖为相对 topic image_raw
    camera_info_topic: /camera_info  # 双相机时 launch 覆盖为相对 topic camera_info
    send_topic: /Send  # 双相机时 launch 覆盖为 Send_pnp
    competition_mode_topic: competition_mode  # 双相机时 launch 覆盖为 /competition_mode
    target_id_topic: target_id  # 双相机时 launch 覆盖为 /target_id
    debug_lights_topic: debug_lights  # 双相机时 launch 覆盖为 detector/debug_lights
    debug_binary_img_topic: binary_img  # 双相机时 launch 覆盖为 detector/binary_img
    debug_result_img_topic: result_img  # 双相机时 launch 覆盖为 detector/result_img
    total_latency_topic: /latency
    draw_cloud: true
    cloud_draw_stride: 5
    # 双相机启动时 use_target_id 会被强制覆盖为 false。
    # 识别半径由 launch_params.yaml 的 cameras.base.radius / cameras.outpost.radius 控制。
    use_target_id: true  # 单相机/兜底模式：是否使用串口 target_id 动态切换半径阈值
    # 双相机启动时 enable_target_gate 会被强制覆盖为 true。
    # base 的 active_target_id=1，outpost 的 active_target_id=0；非当前目标相机跳过识别。
    enable_target_gate: false
    active_target_id: 1
    manual_min_radius: 7.0  # 双相机时会被 cameras.<role>.radius.min 覆盖
    manual_max_radius: 20.0  # 双相机时会被 cameras.<role>.radius.max 覆盖
    # target_id_* 半径只在 use_target_id=true 时使用；当前双相机启动会禁用该模式。
    target_id_0_min_radius: 10.0  # target_id=0 的最小半径
    target_id_0_max_radius: 30.0  # target_id=0 的最大半径
    target_id_1_min_radius: 7.0  # target_id=1 的最小半径
    target_id_1_max_radius: 20.0  # target_id=1 的最大半径
    pnp_circle_radius_mm: 30.0  # 绿灯发光圆物理半径；35mm 下 11px 约对应 27m
    light.min_ratio: 0.05  # 旧参数占位（当前未在代码中使用）
    ignore_classes: ["negative"]  # 旧参数占位（当前未在代码中使用）
    # 新增卡尔曼滤波参数 —— 控制角度自适应滤波切换
    angle_filter_Q_small: 0.001    # 静止时过程噪声
    angle_filter_Q_big:   1.0      # 大运动时过程噪声
    angle_filter_R:       0.01     # 角度测量噪声
    dart_input_mode: serial  # serial 或 barcode
    serial_dart_topic: current_dart_id  # 双相机时 launch 覆盖为 /current_dart_id
    serial_offset_topic: offset  # 双相机时 launch 覆盖为 /offset
    barcode_profile_topic: barcode/scan_profile  # 双相机时 launch 覆盖为 /barcode/scan_profile
    barcode_slot_count: 4
    barcode_require_full_slots: true

/cloud_accumulator_node:
  ros__parameters:
    target_frame: odom  # 点云累积参考系（通常为固定坐标系）
    window_sec: 3.0  # 滑窗长度（秒）
    max_publish_hz: 10.0  # 累积点云最大发布频率
    publish_only_on_new_cloud: true  # 无新点云时跳过重复发布
    voxel_leaf: 0.03  # 体素滤波尺寸（米）
    range_min: 2.0  # 距离裁剪下限（米）
    range_max: 40.0  # 距离裁剪上限（米）
    max_points: 2000000  # 点云缓存点数上限
    use_tf_at_cloud_stamp: true  # 是否使用点云时间戳查询 TF
    executor_threads: 2  # 累积节点执行器线程数

/range_fusion_node:
  ros__parameters:
    # 双相机启动时，camera_optical_frame / camera_info_topic 会由 launch
    # 按 base/outpost 分别覆盖；双相机外参和 frame 请改 launch_params.yaml。
    camera_optical_frame: camera_optical_frame  # 双相机时由 cameras.<role>.frame_id 覆盖
    accum_cloud_frame: odom  # 累积点云坐标系
    camera_info_topic: /camera_info  # 双相机时 launch 覆盖为相对 topic camera_info
    angle_unit: deg  # 角度单位（deg/rad）
    gate_yaw: 1.0  # 角度门限半宽（与 angle_unit 一致）
    roi_scale: 4.0  # ROI 半径放大系数（圆ROI投影）
    use_z_as_range: false  # true 使用 Z 作为距离，false 使用 sqrt(x^2+z^2)
    valid_range_min: 15.0  # 绿灯有效距离下限（米）
    valid_range_max: 30.0  # 绿灯有效距离上限（米）
    min_points: 5  # ROI 最少点数
    mad_thresh: 0.8  # MAD 阈值（米）
    fallback_to_pnp: false  # ROI 无效时不回退到 PnP，避免输出 100m 假距离
    output_stability_logic: and  # and: 输入稳定 && ROI 有效；or: 任一为真
    executor_threads: 3  # 融合节点执行器线程数

/send_mux:
  ros__parameters:
    base_topic: /base/Send_fused
    outpost_topic: /outpost/Send_fused
    target_id_topic: /target_id
    output_topic: /Send
    timeout_sec: 0.2
