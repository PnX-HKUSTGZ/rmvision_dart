/camera_node:
  ros__parameters:
    # 这里保留默认兜底值；实际生效的 camera_name / camera_info_url
    # 由 launch_params.yaml 中的 active_lens_profile 在启动时覆盖。
    camera_name: hik_35mm
    camera_info_url: package://rm_vision_bringup/config/camera_info_35mm.yaml
    exposure_time: 2500  # 曝光时间（单位取决于相机驱动）
    gain: 5.0  # 增益

/serial_driver:
  ros__parameters:
    timestamp_offset: -0.0025  # 串口时间戳补偿（秒）
    device_name: /dev/ttyACM0  # 串口设备
    baud_rate: 115200  # 波特率
    flow_control: none  # 流控
    parity: none  # 校验位
    stop_bits: "1"  # 停止位

/barcode_scanner:
  ros__parameters:
    device_name: /dev/ttyUSB0
    baud_rate: 115200
    flow_control: none
    parity: none
    stop_bits: "1"
    profile_topic: barcode/scan_profile
    slot_count: 4
    dart_id_min: 1
    dart_id_max: 16
    offset_min_deg: -10.0
    offset_max_deg: 10.0
    barcode_regex: "^D([0-9]+),O([+-]?[0-9]*\\.?[0-9]+)$"

/light_detector:
  ros__parameters:
    debug: true  # 调试输出开关
    binary_threshold: 100  # 二值化阈值
    camera_optical_frame: camera_optical_frame
    cloud_topic: /livox/accum_points
    fused_send_topic: send_fused
    total_latency_topic: /latency
    draw_cloud: true
    cloud_draw_stride: 5
    use_target_id: true  # 是否使用串口 target_id 动态切换半径阈值
    manual_min_radius: 10.0  # 关闭 use_target_id 时的最小半径
    manual_max_radius: 50.0  # 关闭 use_target_id 时的最大半径
    target_id_0_min_radius: 50.0  # target_id=0 的最小半径
    target_id_0_max_radius: 80.0  # target_id=0 的最大半径
    target_id_1_min_radius: 10.0  # target_id=1 的最小半径
    target_id_1_max_radius: 50.0  # target_id=1 的最大半径
    light.min_ratio: 0.05  # 旧参数占位（当前未在代码中使用）
    ignore_classes: ["negative"]  # 旧参数占位（当前未在代码中使用）
    # 新增卡尔曼滤波参数 —— 控制角度自适应滤波切换
    angle_filter_Q_small: 0.001    # 静止时过程噪声
    angle_filter_Q_big:   1.0      # 大运动时过程噪声
    angle_filter_R:       0.01     # 角度测量噪声
    dart_input_mode: serial  # serial 或 barcode
    serial_dart_topic: current_dart_id
    serial_offset_topic: offset
    barcode_profile_topic: barcode/scan_profile
    barcode_slot_count: 4
    barcode_require_full_slots: true

/cloud_accumulator_node:
  ros__parameters:
    target_frame: odom  # 点云累积参考系（通常为固定坐标系）
    window_sec: 3.0  # 滑窗长度（秒）
    max_publish_hz: 10.0  # 累积点云最大发布频率
    publish_only_on_new_cloud: true  # 无新点云时跳过重复发布
    voxel_leaf: 0.03  # 体素滤波尺寸（米）
    range_min: 2.0  # 距离裁剪下限（米）
    range_max: 40.0  # 距离裁剪上限（米）
    max_points: 2000000  # 点云缓存点数上限
    use_tf_at_cloud_stamp: true  # 是否使用点云时间戳查询 TF
    executor_threads: 2  # 累积节点执行器线程数

/range_fusion_node:
  ros__parameters:
    camera_optical_frame: camera_optical_frame  # 相机光学坐标系
    accum_cloud_frame: odom  # 累积点云坐标系
    angle_unit: deg  # 角度单位（deg/rad）
    gate_yaw: 1.0  # 角度门限半宽（与 angle_unit 一致）
    roi_scale: 1.5  # ROI 半径放大系数（圆ROI投影）
    use_z_as_range: false  # true 使用 Z 作为距离，false 使用 sqrt(x^2+z^2)
    min_points: 30  # ROI 最少点数
    mad_thresh: 0.3  # MAD 阈值（米）
    fallback_to_pnp: true  # ROI 无效时是否回退到 PnP 距离
    output_stability_logic: and  # and: 输入稳定 && ROI 有效；or: 任一为真
    executor_threads: 3  # 融合节点执行器线程数
