/camera_node:
  ros__parameters:
    camera_info_url: package://rm_vision_bringup/config/camera_info.yaml  # 相机内参/畸变配置
    exposure_time: 2500  # 曝光时间（单位取决于相机驱动）
    gain: 5.0  # 增益

/serial_driver:
  ros__parameters:
    timestamp_offset: -0.0025  # 串口时间戳补偿（秒）
    device_name: /dev/ttyACM0  # 串口设备
    baud_rate: 115200  # 波特率
    flow_control: none  # 流控
    parity: none  # 校验位
    stop_bits: "1"  # 停止位

/barcode_scanner:
  ros__parameters:
    device_name: /dev/ttyUSB0
    baud_rate: 115200
    flow_control: none
    parity: none
    stop_bits: "1"
    profile_topic: barcode/scan_profile
    slot_count: 4
    dart_id_min: 1
    dart_id_max: 16
    offset_min_deg: -10.0
    offset_max_deg: 10.0
    barcode_regex: "^D([0-9]+),O([+-]?[0-9]*\\.?[0-9]+)$"

/light_detector:
  ros__parameters:
    debug: true  # 调试输出开关
    binary_threshold: 100  # 二值化阈值
    camera_optical_frame: camera_optical_frame
    cloud_topic: /livox/accum_points
    fused_send_topic: send_fused
    total_latency_topic: /latency
    draw_cloud: true
    cloud_draw_stride: 5
    use_target_id: true  # 是否使用串口 target_id 动态切换半径阈值
    manual_min_radius: 20.0  # 关闭 use_target_id 时的最小半径
    manual_max_radius: 50.0  # 关闭 use_target_id 时的最大半径
    light.min_ratio: 0.05  # 旧参数占位（当前未在代码中使用）
    ignore_classes: ["negative"]  # 旧参数占位（当前未在代码中使用）
    # 新增卡尔曼滤波参数 —— 控制角度自适应滤波切换
    angle_filter_Q_small: 0.001    # 静止时过程噪声
    angle_filter_Q_big:   1.0      # 大运动时过程噪声
    angle_filter_R:       0.01     # 角度测量噪声
    dart_input_mode: serial  # serial 或 barcode
    serial_dart_topic: current_dart_id
    serial_offset_topic: offset
    barcode_profile_topic: barcode/scan_profile
    barcode_slot_count: 4
    barcode_require_full_slots: true

/cloud_accumulator_node:
  ros__parameters:
    target_frame: odom  # 调试累积点云参考系（通常为固定坐标系）
    window_sec: 3.0  # 调试滑窗长度（秒）
    publish_hz: 5.0  # 调试累积点云发布频率
    voxel_leaf: 0.03  # 调试体素滤波尺寸（米）
    range_min: 2.0  # 距离裁剪下限（米）
    range_max: 40.0  # 距离裁剪上限（米）
    max_points: 2000000  # 点云缓存点数上限
    use_tf_at_cloud_stamp: true  # 是否使用点云时间戳查询 TF

/range_fusion_node:
  ros__parameters:
    camera_optical_frame: camera_optical_frame  # 相机光学坐标系
    accum_cloud_frame: odom  # 累积点云坐标系
    angle_unit: deg  # 角度单位（deg/rad）
    gate_yaw: 1.0  # 角度门限半宽（与 angle_unit 一致）
    roi_scale: 3.5  # ROI 半径放大系数（圆ROI投影）
    use_z_as_range: false  # true 使用 Z 作为距离，false 使用 sqrt(x^2+y^2+z^2)
    min_points: 8  # ROI 最少点数
    mad_thresh: 0.8  # 绝对 MAD 上限（米），超限触发回退
    window_min_sec: 0.25  # 自适应累积窗口下限（秒）
    window_max_sec: 1.5  # 自适应累积窗口上限（秒）
    window_step_sec: 0.15  # 窗口扩展步长（秒）
    target_points: 20  # 目标有效点数，达到后停止扩窗
    age_tau_sec: 0.6  # 时间衰减常数（秒）
    mad_k: 2.5  # MAD 离群点剔除倍数
    cloud_sync_tolerance_ms: 60.0  # 点云与 Send 时间对齐容差（毫秒）
    range_min: 16.0  # 雷达有效距离下限（米）
    range_max: 27.0  # 雷达有效距离上限（米）
    use_pnp_prior_gate: false  # 使用 PnP 距离先验过滤 ROI 点
    pnp_prior_rel_tol: 0.35  # 相对先验门限
    pnp_prior_abs_tol: 1.0  # 绝对先验门限（米）
    hold_last_lidar_on_failure: true  # ROI 无效时保持上一帧有效雷达距离
    fallback_to_pnp: false  # ROI 无效时是否回退到 PnP 距离
    output_stability_logic: and  # and: 输入稳定 && ROI 有效；or: 任一为真
